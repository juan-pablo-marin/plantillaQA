# ═══════════════════════════════════════════════════════════════
#  JENKINS OVERRIDE — Reservado para configuraciones exclusivas
#  de Jenkins en Docker-in-Docker (DinD).
#
#  Uso (solo desde Jenkins, vía Jenkinsfile):
#    docker compose -f docker-compose.qa.yml -f docker-compose.jenkins.yml ...
#
#  Actualmente no necesita sobreescribir nada. Los bind mounts
#  problemáticos ya fueron removidos del archivo base y movidos
#  a docker-compose.dev-override.yml para desarrollo local.
#
#  Este archivo se mantiene como punto de entrada para futuras
#  configuraciones exclusivas de Jenkins (e.g., timeouts, limits).
# ═══════════════════════════════════════════════════════════════

services:
  qa-runner:
    # ── Jenkins Override ──
    # En Jenkins (DinD), si dejamos los bind mounts de código fuente (./fuc-sena:/src/backend:ro), 
    # el daemon de Docker del host intentará montar esas rutas relativas DESDE LA MÁQUINA ANFITRIONA, 
    # donde el path relativo de Jenkins no existe, resultando en carpetas vacías y "No such file or directory".
    #
    # Por lo tanto, en el entorno de Jenkins, le decimos a Compose que ignore los montajes de
    # código fuente host-to-container porque el Dockerfile.qa ya hizo "COPY . ." en el build.
    # Solo preservamos el montaje de reportes, caché de sonar y las variables.
    volumes:
      - ./qa/reports:/qa/reports
      - sonar_scanner_cache:/root/.sonar/cache
