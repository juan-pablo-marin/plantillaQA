# ═══════════════════════════════════════════════════════════════
#  JENKINS OVERRIDE — Configuraciones exclusivas de Jenkins
#  en Docker-in-Docker (DinD).
#
#  Uso (solo desde Jenkins, vía Jenkinsfile):
#    docker compose -p qa-pipeline -f docker-compose.qa.yml -f docker-compose.jenkins.yml ...
#  El nombre de proyecto lo fija docker-compose.qa.yml / qa_fuc.yml (name: qa-pipeline).
# ═══════════════════════════════════════════════════════════════

services:
  qa-runner:
    volumes:
      - ./qa/reports:/qa/reports
      - sonar_scanner_cache:/root/.sonar/cache
