  - name: File Upload
    meta:
      id: fld_fcbf2bfe517e4f5f8799f8c8bb55fa2b
      created: 1740873600000
      modified: 1773324708116
      sortKey: -1740873600001
      description: Endpoints para subida y eliminacion de archivos. Soporta carga por
        chunks (partes) para archivos grandes (.txt, .xlsx, .xls).
    children:
      - url: "{{ _.base_url }}/upload"
        name: Upload File Chunk
        meta:
          id: req_32f3984f900b4527add6053660ea7c78
          created: 1740873600000
          modified: 1773324708134
          isPrivate: false
          description: >2-
              Sube un chunk (parte) de archivo al servidor.

              ## Autenticación
              Requiere header:
              Authorization: Bearer {token}

              ## Campos (multipart/form-data)

              | Campo          | Tipo     | Requerido | Descripción                                                                       |
              |----------------|----------|-----------|-----------------------------------------------------------------------------------|
              | `file`         | file     | Sí        | El chunk a subir. El nombre **debe** contener `parteN` (ej: `archivo_parte1.txt`) |
              | `sizeMainFile` | integer  | Sí        | Tamaño total del archivo completo en bytes                                        |

              ## Regla de nombrado de chunks — obligatoria

              El frontend debe dividir el archivo en fragmentos de **10MB** y renombrar cada uno antes de enviarlo:

              archivo.txt (35MB)
                → archivo_parte1.txt  (primer envío)
                → archivo_parte2.txt  (segundo envío)
                → archivo_parte3.txt  (tercer envío)
                → archivo_parte4.txt  (último envío)

              Si el nombre del chunk no contiene `parteN`, el backend rechaza con `500 — chunk arrived out of sequential order`.

              ## Flujo de carga por chunks

              1. Dividir el archivo en partes de 10MB nombradas con `_parteN` antes de la extensión.
              2. Enviar cada parte en orden secuencial (parte1, parte2, parte3...).
              3. Incluir siempre `sizeMainFile` con el tamaño del archivo **original completo**.
              4. El servidor responde `is_complete: false` por cada chunk intermedio.
              5. Al recibir todos los bytes, responde `is_complete: true` y procesa el archivo automáticamente en base de datos.

              ## Respuesta exitosa — archivo completo (200)
              ```json

            	{
            		"success": true,
            		"data": {
            			"is_complete": true,
            			"message": "file uploaded and processed successfully",
            			"file_path": "/app/cmd/uploads/_UNIVERSO_VICTIMAS_LB_parte.txt"
            		},
            		"message": "Archivo cargado y procesado exitosamente"
            	}

              Errores posibles

              - 400 — El archivo es requerido
              - 400 — sizeMainFile debe ser un entero valido
              - 401 — token no proporcionado / token inválido / token expirado
              - 500 — Error al abrir el archivo cargado
              - 500 — file type is not supported, allowed: .txt, .xlsx, .xls
              - 500 — chunk arrived out of sequential order
          sortKey: -1740873600001
        method: POST
        body:
          mimeType: multipart/form-data
          params:
            - name: file
              value: ""
              description: Archivo o chunk a subir (.txt, .xlsx, .xls)
              fileName: C:\Users\rogstrix\Videos\0002_UNIVERSO_VICTIMAS_LB_parte1.txt
              type: file
            - name: sizeMainFile
              value: "5341866043"
              description: Tamano total del archivo completo en bytes
              type: text
        authentication:
          type: bearer
          token: "{{ _.token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/delete/example_file.txt"
        name: Delete File
        meta:
          id: req_48fc55e389dc4818b135ae3b1be9e585
          created: 1740873600000
          modified: 1773324708141
          isPrivate: false
          description: >2-
              ## Para `DELETE /api/v1/delete/:fileName`

              Elimina un archivo parcialmente ensamblado del servidor cuando falla la conexión durante el upload.

              > ⚠️ **Este endpoint no es para el botón de eliminar de la UI.**
              > Es un mecanismo automático de recuperación: se llama desde el código cuando se detecta
              > pérdida de conexión (`navigator.onLine === false`) durante el envío de un chunk.
              > Debe ejecutarse cuando el internet vuelve (evento `online`), no inmediatamente al caer.

              ## Aclaración — botón eliminar de la UI
            	
            	El botón de eliminar (ícono papelera) que aparece en la interfaz al seleccionar un archivo
              **no tiene relación con este endpoint**. Ese botón únicamente resetea el estado local
              del frontend (deselecciona el archivo) permitiendo al usuario elegir otro archivo diferente.
              Es equivalente a "cancelar selección".

              | Acción | Llama al backend | Efecto |
              |--------|-----------------|--------|
              | Botón papelera en UI | ❌ No | Deselecciona el archivo, permite elegir otro |
              | Este endpoint DELETE | ✅ Sí (automático por código) | Elimina archivo parcial del servidor si cae el WiFi |
            	

              ## Cuándo llamarlo

              **Condición:** el fetch de un chunk falla con `TypeError` y `navigator.onLine === false`.

              En ese momento **no se puede llamar el endpoint** porque no hay conexión.
              Lo correcto es registrar un listener y ejecutarlo automáticamente cuando el internet vuelva:

              1. WiFi cae durante el envío de un chunk → fetch lanza `TypeError`
              2. Frontend detecta `!navigator.onLine` → registra listener del evento `online`
              3. Frontend muestra error al usuario en la UI
              4. WiFi vuelve → evento `online` se dispara automáticamente
              5. Frontend ejecuta `DELETE /api/v1/delete/:fileName` → servidor limpia el archivo parcial
              6. Sistema queda limpio y listo para reintentar el upload desde cero
            	
            	
              ## Autenticación
              Requiere header:
              Authorization: Bearer {token}

              ## Path Parameter

              | Parámetro | Tipo | Descripción |
              |-----------|------|-------------|
              | `:fileName` | string | Nombre del chunk que se estaba enviando cuando falló (ej: `archivo_parte2.txt`) |

              ## Qué hace el backend

              Convierte internamente el nombre del chunk al nombre del archivo ensamblado en disco
              eliminando los dígitos (`archivo_parte2.txt` → `archivo_parte.txt`) y lo borra.
              La base de datos **no se ve afectada** porque los datos solo se insertan cuando el
              archivo está 100% completo.

              ## Respuesta exitosa (200)
              ```json
              {
                "success": true,
                "message": "Archivo eliminado exitosamente"
              }

              Errores posibles

              - 400 — El nombre del archivo es requerido
              - 401 — token no proporcionado / token inválido / token expirado
              - 500 — failed to delete file from storage
          sortKey: -1740873600000
        method: DELETE
        authentication:
          type: bearer
          token: "{{ _.token }}"
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
