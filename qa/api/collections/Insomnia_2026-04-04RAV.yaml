            ```


            ## Grupos etarios

            - Primera infancia (0-5 anos)

            - Infancia (6-11 anos)

            - Adolescencia temprana (12-13 anos)

            - Adolescencia (14-18 anos)

            - Juventud (19-26 anos)

            - Adultez (27-59 anos)

            - Persona mayor (60 anos o mas)

            - Sin fecha / Otro grupo etario


