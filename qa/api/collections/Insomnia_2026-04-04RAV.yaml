        el registro completo de la victima por numero de documento.
    children:
      - url: "{{ _.base_url }}/victims/39178315"
        name: Search Victim by Document
        meta:
          id: req_12ee6f83b1184630a26f7f81a80699ef
          created: 1740873600000
          modified: 1773330749715
          isPrivate: false
          description: |+
            ## Path Parameter                                                                                                                                                                                                          
            | Parametro | Tipo | Descripcion |                                                                                                                                                                                         
            |-----------|------|-------------|                                                                                                                                                                                         
            | `:document_number` | string | Numero de documento de la victima |

              ## Query Parameter
              | Parametro | Tipo | Requerido | Descripcion |
              |-----------|------|-----------|-------------|
              | `document_type` | string | Si | Tipo de documento. Ver tabla de valores permitidos |

              ## Valores permitidos para `document_type`
              | Valor | Descripcion |
              |-------|-------------|
              | `CC` | Cedula de ciudadania |
              | `CE` | Cedula de extranjeria |
              | `NIT` | Numero de identificacion tributaria |
              | `PA` | Pasaporte |
              | `OTRO` | Agrupa: TI, RC, NI, IND, NUIP, SR, RCD, NIP, PB, LM |

              ## Ejemplos de uso
              GET /api/v1/victims/39178315?document_type=CC
            	
              GET /api/v1/victims/1715133367?document_type=CE
            	
              GET /api/v1/victims/22010951?document_type=NIT
            	
              GET /api/v1/victims/497807436?document_type=PA
            	
              GET /api/v1/victims/1017928854?document_type=OTRO

              ## Respuesta exitosa (200)
              ```json
              {
                "success": true,
                "data": {
                  "document_type": "CC",
                  "document": "39178315",
                  "first_name": "Juan",
                  "middle_name": "Carlos",
                  "first_surname": "Perez",
                  "second_surname": "Garcia",
                  "ethnic_group": "NINGUNO",
                  "household_id": "2799160",
                  "residence_location": "Barrio Centro",
                  "mobile_phone": "3001234567",
                  "origin": "UNIDAD VICTIMAS",
                  "source": "RUV LEY 1448"
                },
                "message": "Victima encontrada exitosamente"
              }

              Errores posibles

              ┌────────┬─────────────────────────────────────┬─────────────────────────────────────────────────────────┐
              │ Codigo │               Mensaje               │                          Causa                          │
              ├────────┼─────────────────────────────────────┼─────────────────────────────────────────────────────────┤
              │ 400    │ El numero de documento es requerido │ No se envio :document_number en la URL                  │
              ├────────┼─────────────────────────────────────┼─────────────────────────────────────────────────────────┤
              │ 400    │ El tipo de documento es requerido   │ No se envio el query param document_type                │
              ├────────┼─────────────────────────────────────┼─────────────────────────────────────────────────────────┤
              │ 400    │ tipo de documento invalido: XYZ...  │ El valor de document_type no esta en la lista permitida │
              ├────────┼─────────────────────────────────────┼─────────────────────────────────────────────────────────┤
              │ 404    │ Victima no encontrada               │ No existe un registro con ese documento y tipo en la BD │
              ├────────┼─────────────────────────────────────┼─────────────────────────────────────────────────────────┤
              │ 500    │ Error al buscar la victima          │ Error interno del servidor                              │
              └────────┴─────────────────────────────────────┴─────────────────────────────────────────────────────────┘

              Nota para el frontend

              El desplegable debe enviar exactamente estos valores en document_type:
              - Cedula de ciudadania → CC
              - Cedula de extranjeria → CE
              - Numero de identificacion tributaria → NIT
              - Registro unico de contribuyentes → no existe en BD, deshabilitar esta opcion O mantenerla aunque la elijan siempre retornara no encontrado
              - Pasaporte → PA
              - Otro → OTRO


          sortKey: -1740873600000
        method: GET
        parameters:
          - name: document_type
            value: CC
            description: ""
            disabled: false
        authentication:
          type: bearer
          token: "{{ _.token }}"
        settings:
