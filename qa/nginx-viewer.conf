server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html index.htm;
    autoindex    on;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    error_page 403 404 /fallback.html;
    location = /fallback.html {
        internal;
        default_type text/html;
        return 200 '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta http-equiv="refresh" content="15"><title>Esperando reporte...</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{background:#16213e;border-radius:12px;padding:48px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3);max-width:520px}h1{font-size:1.5em;margin-bottom:16px;color:#a8b2d1}.spinner{border:4px solid #233554;border-top:4px solid #64ffda;border-radius:50%;width:48px;height:48px;animation:spin 1s linear infinite;margin:0 auto 24px}@keyframes spin{to{transform:rotate(360deg)}}p{color:#8892b0;line-height:1.6;margin-bottom:8px}.hint{font-size:.85em;color:#495670;margin-top:16px}</style></head><body><div class="card"><div class="spinner"></div><h1>Reporte no disponible aun</h1><p>El reporte se generara automaticamente durante la proxima ejecucion del pipeline de QA en Jenkins.</p><p class="hint">Esta pagina se actualiza automaticamente cada 15 segundos.</p></div></body></html>';
    }
}
