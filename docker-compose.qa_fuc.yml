# ═══════════════════════════════════════════════════════════════
#  QA STACK — FUC (Mongo + BACKEND/FRONTEND plantilla original)
#
#  Uso:
#    docker compose --env-file .env.qa_fuc -f docker-compose.qa_fuc.yml up -d
#
#  Stack completo (Sonar, Influx, Grafana, Allure, Jenkins, visores, app):
#    docker compose --env-file .env.qa_fuc -f docker-compose.qa_fuc.yml --profile all up -d --build
#
#  RAV: usar docker-compose.qa.yml + .env.qa
# ═══════════════════════════════════════════════════════════════
#  Uso (histórico):
#    - Levantar todo:    docker compose --env-file .env.qa_fuc -f docker-compose.qa_fuc.yml up -d
#    - Solo Sonar:       docker compose --env-file .env.qa -f docker-compose.qa.yml --profile sonar up -d
#    - Solo E2E + Sonar: docker compose --env-file .env.qa -f docker-compose.qa.yml --profile sonar --profile test-e2e up
#    - Performance:      docker compose --env-file .env.qa -f docker-compose.qa.yml --profile perf up -d
#
#  Flags de pruebas (en .env.qa o como variables de entorno):
#    RUN_NEWMAN=true      → Activa tests de API con Newman
#    RUN_SONAR=true       → Activa análisis estático con SonarQube
#    RUN_PLAYWRIGHT=true  → Activa tests E2E con Playwright
#    RUN_K6=true          → Activa tests de rendimiento con k6
# ═══════════════════════════════════════════════════════════════

# Mismo criterio que Jenkins (COMPOSE_PROJECT_NAME=qa-pipeline): todo el stack bajo un único
# proyecto Compose, no el nombre de la carpeta del repo (p. ej. fichacaracterizacionv1).
name: qa-pipeline

x-common-healthcheck: &common-healthcheck
  interval: 15s
  timeout: 10s
  retries: 5
  start_period: 30s

networks:
  qa-network:
    name: ${PROJECT_NAME}-qa-network
    driver: bridge

volumes:
  mongodb_qa_data:
    name: ${PROJECT_NAME}-mongodb-qa-data
  sonarqube_data:
    name: ${PROJECT_NAME}-sonarqube-data
  sonarqube_extensions:
    name: ${PROJECT_NAME}-sonarqube-extensions
  sonarqube_logs:
    name: ${PROJECT_NAME}-sonarqube-logs
  sonarqube_db_data:
    name: ${PROJECT_NAME}-sonarqube-db-data
  sonar_scanner_cache:
    name: ${PROJECT_NAME}-sonar-scanner-cache
  influxdb_data:
    name: ${PROJECT_NAME}-influxdb-data
  grafana_data:
    name: ${PROJECT_NAME}-grafana-data
  jenkins_qa_data:
    name: ${PROJECT_NAME}-jenkins-qa-data
  playwright_cache:
    name: ${PROJECT_NAME}-playwright-cache
  pnpm_cache:
    name: ${PROJECT_NAME}-pnpm-cache

services:

  # --- Base de datos — MongoDB (App) ---
  db:
    image: mongo:7
    container_name: ${PROJECT_NAME}-mongodb-qa
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "${DB_PORT:-27017}:27017"
    volumes:
      - mongodb_qa_data:/data/db
    healthcheck:
      # Intervalo corto: pasar a healthy en cuanto mongod acepta auth (no esperar 15s entre intentos).
      test: ["CMD-SHELL", "mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping')\" --quiet"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s
    networks:
      - qa-network

  # --- Backend ---
  backend:
    build:
      context: ./${BACKEND_DIR:-BACKEND}
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-api-qa
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT:-8080}
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/${MONGO_DB}?authSource=admin
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      # El bucle Jenkins espera BE_ST=healthy; Node/conn Mongo suele tardar más que 30s en cold start.
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 8s
      retries: 10
      start_period: 90s
    networks:
      - qa-network

  # --- Frontend ---
  frontend:
    build:
      context: ./${FRONTEND_DIR:-FRONTEND}
      dockerfile: Dockerfile
      # Mismo criterio que RAV / Dockerfile Next.js oficial: stage final suele llamarse "runner", no "runtime".
      target: ${FRONTEND_TARGET:-runner}
    container_name: ${PROJECT_NAME}-frontend-qa
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api/v1
    networks:
      - qa-network

  # --- SonarQube — Database (Postgres) ---
  sonar-db:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME}-sonar-db
    profiles: [ "sonar", "all" ]
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    ports:
      - "15432:5432"
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sonar -d sonarqube" ]
      <<: *common-healthcheck
    networks:
      - qa-network

  # --- SonarQube — Server ---
  sonarqube:
    image: sonarqube:10.4-community
    container_name: ${PROJECT_NAME}-sonarqube
    profiles: [ "sonar", "all" ]
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      SONAR_WEB_JAVAOPTS: "-Xmx2G -Xms2G"
      SONAR_CE_JAVAOPTS: "-Xmx2G -Xms2G"
    deploy:
      resources:
        limits:
          memory: 4G
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'" ]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    networks:
      - qa-network

  # --- QA Runner (Master Orchestrator) ---
  qa-runner:
    build:
      context: .
      dockerfile: ./qa/Dockerfile.qa
      args:
        BACKEND_DIR: ${BACKEND_DIR:-BACKEND}
        FRONTEND_DIR: ${FRONTEND_DIR:-FRONTEND}
    container_name: ${PROJECT_NAME}-qa-runner
    profiles: [ "test-e2e", "all" ]
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      influxdb:
        condition: service_healthy
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-qa}
      - BACKEND_URL=${BACKEND_URL:-http://backend:8080}
      - FRONTEND_URL=${FRONTEND_URL:-http://frontend:3000}
      - SONAR_HOST_URL=http://sonarqube:9000
      - SONAR_TOKEN=${SONAR_TOKEN:-}
      - PROJECT_KEY=${PROJECT_KEY:-qa-project}
      # ── Flags de pruebas (false = desactivado, true = activo) ──
      - RUN_NEWMAN=${RUN_NEWMAN:-false}
      - RUN_SONAR=${RUN_SONAR:-false}
      - RUN_PLAYWRIGHT=${RUN_PLAYWRIGHT:-false}
      - RUN_K6=${RUN_K6:-false}
      # ──────────────────────────────────────────────────────────
      - SONAR_WAIT_SECONDS=${SONAR_WAIT_SECONDS:-120}
      - SONAR_SCAN_TIMEOUT=${SONAR_SCAN_TIMEOUT:-20m}
      # JVM del scanner: solo plugins necesarios + heap (sobrescribible en .env.qa_fuc)
      - SONAR_SCANNER_OPTS=-Dsonar.plugins.downloadOnlyRequired=true -Xmx2048m
    shm_size: '2gb'
    volumes:
      - ./qa/reports:/qa/reports
      - sonar_scanner_cache:/root/.sonar/cache
      - playwright_cache:/ms-playwright
      - pnpm_cache:/pnpm-cache
    command: [ "bash", "run-tests_fuc.sh" ]
    networks:
      - qa-network

  # --- InfluxDB (time-series store para métricas k6) ---
  influxdb:
    image: influxdb:1.8
    container_name: ${PROJECT_NAME}-influxdb
    profiles: [ "perf", "jenkins", "all", "test-e2e" ]
    restart: unless-stopped
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
      INFLUXDB_DATA_CACHE_MAX_MEMORY_SIZE: "1073741824"
      INFLUXDB_DATA_CACHE_SNAPSHOT_MEMORY_SIZE: "52428800"
      INFLUXDB_DATA_COMPACT_FULL_WRITE_COLD_DURATION: "4h"
      INFLUXDB_DATA_INDEX_VERSION: "tsi1"
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
      - ./qa/influxdb/init.iql:/docker-entrypoint-initdb.d/init.iql:ro
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - qa-network

  # --- Grafana (dashboard de métricas k6) ---
  # Provisioning embebido vía Dockerfile (fix DinD bind mounts)
  grafana:
    build:
      context: .
      dockerfile: ./qa/Dockerfile.grafana
    container_name: ${PROJECT_NAME}-grafana
    profiles: [ "perf", "jenkins", "all", "test-e2e" ]
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "5s"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null | grep -q 'database.*ok'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - qa-network

  # --- k6 Runner (solo performance) ---
  k6-runner:
    build:
      context: .
      dockerfile: ./qa/Dockerfile.qa
      args:
        BACKEND_DIR: ${BACKEND_DIR:-BACKEND}
        FRONTEND_DIR: ${FRONTEND_DIR:-FRONTEND}
    container_name: ${PROJECT_NAME}-k6-runner
    profiles: [ "perf" ]
    depends_on:
      backend:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://backend:8080
    volumes:
      - ./qa/reports:/qa/reports
      - ./qa/performance:/qa/performance:ro
      - playwright_cache:/ms-playwright
      - pnpm_cache:/pnpm-cache
    command: [ "bash", "-lc", "mkdir -p /qa/reports/k6 && k6 run /qa/performance/k6-tests_fuc.js -e BACKEND_URL=$$BACKEND_URL --out influxdb=http://influxdb:8086/k6 --summary-export /qa/reports/k6/summary.json" ]
    networks:
      - qa-network

  # --- Allure Reports Viewer ---
  allure:
    image: frankescobar/allure-docker-service:2.13.6
    container_name: ${PROJECT_NAME}-allure
    profiles: [ "viewers", "all" ]
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 1
      KEEP_HISTORY: 1
    ports:
      - "5050:5050"
    volumes:
      - ./qa/reports/fuc/allure-results:/app/allure-results
      - ./qa/reports/fuc/allure-reports:/app/default-reports
    networks:
      - qa-network

  # --- Allure UI (React SPA; sin puerto expuesto — nginx hace de proxy) ---
  allure-ui:
    image: frankescobar/allure-docker-service-ui
    container_name: ${PROJECT_NAME}-allure-ui
    profiles: [ "viewers", "all" ]
    depends_on:
      - allure
    environment:
      - ALLURE_DOCKER_PUBLIC_API_URL=http://localhost:5252
      - ALLURE_DOCKER_PUBLIC_API_URL_PREFIX=
    networks:
      - qa-network

  # --- Nginx reverse-proxy: une UI y API bajo localhost:5252 (mismo origen) ---
  allure-nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-allure-nginx
    profiles: [ "viewers", "all" ]
    depends_on:
      - allure
      - allure-ui
    ports:
      - "5252:80"
    volumes:
      - ./qa/allure-nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - qa-network

  # --- Newman Report Viewer (Standalone — persiste entre builds) ---
  # NOTA: Sin bind mount — en DinD las rutas relativas se resuelven a /app/...
  # que no existe en el host. Jenkins inyecta reportes vía 'docker cp'.
  newman-viewer:
    build:
      context: .
      dockerfile: ./qa/Dockerfile.viewer
    container_name: ${PROJECT_NAME}-newman-viewer
    profiles: [ "test-e2e", "jenkins", "all", "report" ]
    restart: unless-stopped
    ports:
      - "8181:80"
    networks:
      - qa-network

  # --- Playwright Report Viewer (Standalone — persiste entre builds) ---
  # NOTA: Sin bind mount — en DinD las rutas relativas se resuelven a /app/...
  # que no existe en el host. Jenkins inyecta reportes vía 'docker cp'.
  playwright-viewer:
    build:
      context: .
      dockerfile: ./qa/Dockerfile.viewer
    container_name: ${PROJECT_NAME}-playwright-viewer
    profiles: [ "test-e2e", "jenkins", "all", "report" ]
    restart: unless-stopped
    ports:
      - "8182:80"
    networks:
      - qa-network

  # --- Jenkins (CI/CD Orchestrator) ---
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: ${PROJECT_NAME}-jenkins-qa
    user: root
    profiles: [ "jenkins", "all" ]
    restart: unless-stopped
    ports:
      - "${JENKINS_PORT:-8085}:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Dhudson.model.DirectoryBrowserSupport.CSP=
      - JENKINS_ADMIN_ID=admin
      - JENKINS_ADMIN_PASSWORD=admin
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - jenkins_qa_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    working_dir: /app
    networks:
      - qa-network
