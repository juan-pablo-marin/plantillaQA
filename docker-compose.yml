# ============================================
# docker-compose.yml — Desarrollo FUC (Mongo + API que exige MONGO_URI)
#
# NO es el stack RAV (Postgres). Si ves en logs "MONGO_URI is required":
#   - Estás usando ESTE archivo sin .env.dev (con MONGO_*), o
#   - Tienes un contenedor "backend" viejo de FUC mezclado con db Postgres de RAV.
#
# Stack QA RAV (víctimas / Postgres):
#   docker compose --env-file .env.qa -f docker-compose.qa.yml -f docker-compose.jenkins.yml up -d ...
#
# Uso de ESTE archivo (perfil obligatorio; evita choque con RAV/QA):
#   docker compose --profile fuc-dev --env-file .env.dev up -d --build
# ============================================

name: fuc-dev

services:

  # --- Base de datos — MongoDB ---
  db:
    profiles: [fuc-dev]
    image: mongo:7
    container_name: ${PROJECT_NAME}-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "${DB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  # --- Backend ---
  backend:
    profiles: [fuc-dev]
    build:
      context: ./${BACKEND_DIR:-BACKEND}
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: ${PROJECT_NAME}-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT:-8080}
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/${MONGO_DB}?authSource=admin
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # --- Frontend ---
  frontend:
    profiles: [fuc-dev]
    build:
      context: ./${FRONTEND_DIR:-FRONTEND}
      dockerfile: Dockerfile
      target: dev
    container_name: ${PROJECT_NAME}-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api/v1
    networks:
      - app-network

volumes:
  mongodb_data:
    name: ${PROJECT_NAME}-mongodb-data

networks:
  app-network:
    name: ${PROJECT_NAME}-network
    driver: bridge
