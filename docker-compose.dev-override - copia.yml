# ═══════════════════════════════════════════════════════════════
#  DEV OVERRIDE — Hot-reload para desarrollo local
#  Uso:
#    docker compose --env-file .env.qa -f docker-compose.qa.yml -f docker-compose.dev-override.yml --profile test-e2e up --build
#
#  Monta archivos individuales del qa-runner para reflejar cambios
#  sin necesidad de rebuild. NO usar en Jenkins (Docker-in-Docker).
# ═══════════════════════════════════════════════════════════════

services:
  qa-runner:
    volumes:
      - ./qa/run-tests.sh:/qa/run-tests.sh:ro
      - ./qa/api:/qa/api:ro
      - ./qa/playwright.config.ts:/qa/playwright.config.ts:ro
      - ./qa/ui/tests:/qa/ui/tests:ro
      - ./qa/performance:/qa/performance:ro
